name: Build daily epub

on:
  schedule:
    # 11:00 UTC = 6:00 AM CT — edition is ready before morning
    - cron: "0 11 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - feeds.json
      - build_epub.py
      - .github/workflows/build-daily-epub.yml

permissions:
  contents: write

concurrency:
  group: build-daily-epub
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build edition
        run: |
          set -o pipefail
          mkdir -p state
          python build_epub.py 2>&1 | tee state/build.log

      - name: Commit and push
        if: always()
        run: |
          git config user.name "news-reader-bot"
          git config user.email "news-reader-bot@users.noreply.github.com"
          git add daily.epub archive/ state/ build-report.md
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "Edition $(TZ=America/Chicago date +%m-%d-%Y)"
            git push
          fi
